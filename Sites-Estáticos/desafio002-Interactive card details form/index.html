<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <title>projeto003</title>
</head>
<body>
    <header class="header-mobile">
        <div class="back">
            <div class="zero-back">
                <p>000</p>
            </div>
        </div>
        <div class="front">
            <img src="images/card-logo.svg" alt="">
            <section class="zeros-card">
                <div class="zeros">0000</div>
                <div class="zeros">0000</div>
                <div class="zeros">0000</div>
                <div class="zeros">0000</div>
            </section>
            <div class="info-card">
                <p>Jane appleseed</p>
                <p>00/00</p>
            </div>
        </div>
    </header>
    <main class="main-mobile">
        <form action="">

            <div class="campos">
                <label for="iname">carholder name</label> <br>
                <input type="text" name="name" id="iname" placeholder="e.g. Jane Applessed">
            </div>
            <div class="campos">
                <label for="icard">card number</label>
                <input type="text" name="card" id="icard" placeholder="e.g. 1234 5678 9123 0000">
            </div>

            <div class="campos-flex">
                <div class="formularios">
                    <label for="">exp. date (mm/yy)</label>
                    <div class="caixas">
                        <input type="number" name="" id="" placeholder="MM">
                        <input type="number" name="" id="" placeholder="YY">
                    </div>
                </div>

                <div class="formularios">
                    <label for="">cvc</label>
                        <input type="number" name="" id="" placeholder="e.g. 123">
                </div>
            </div>

            <div class="campos">
                <input type="submit" value="Confirm">
            </div>
        </form>
        <footer>
            <p>desafio feito por Victor Fernandes</p>
        </footer>
    </main>
